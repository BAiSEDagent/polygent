<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cogent — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0F;
      --bg-card: #12121A;
      --bg-hover: #1A1A25;
      --blue: #0052FF;
      --blue-dim: rgba(0, 82, 255, 0.15);
      --blue-glow: rgba(0, 82, 255, 0.3);
      --green: #00D084;
      --red: #FF3B5C;
      --yellow: #FFB800;
      --text: #E8E8ED;
      --text-dim: #6B6B7B;
      --border: #1E1E2A;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ─── Layout ─── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      margin: 1px;
    }

    .card {
      background: var(--bg-card);
      padding: 20px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-title .live {
      width: 6px;
      height: 6px;
      background: var(--blue);
      animation: pulse 1.5s infinite;
    }

    /* ─── Stats Row ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      margin: 1px;
    }

    .stat {
      background: var(--bg-card);
      padding: 20px;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.positive { color: var(--green); }
    .stat-value.negative { color: var(--red); }
    .stat-value.blue { color: var(--blue); }

    .stat-sub {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ─── Activity Feed ─── */
    .feed {
      max-height: 400px;
      overflow-y: auto;
    }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .feed-item:last-child { border-bottom: none; }

    .feed-time {
      color: var(--text-dim);
      min-width: 65px;
    }

    .feed-badge {
      padding: 2px 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      min-width: 36px;
      text-align: center;
    }

    .feed-badge.buy { background: rgba(0, 208, 132, 0.15); color: var(--green); }
    .feed-badge.sell { background: rgba(255, 59, 92, 0.15); color: var(--red); }
    .feed-badge.cancel { background: rgba(255, 184, 0, 0.15); color: var(--yellow); }

    .feed-agent { color: var(--blue); }
    .feed-detail { color: var(--text-dim); }

    /* ─── Leaderboard ─── */
    .leaderboard-table {
      width: 100%;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .leaderboard-table th {
      text-align: left;
      padding: 8px 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }

    .leaderboard-table td {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .leaderboard-table tr:last-child td { border-bottom: none; }

    .rank { color: var(--text-dim); }
    .rank-1 { color: var(--yellow); font-weight: 700; }

    /* ─── P&L Chart (CSS-only bar chart) ─── */
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 120px;
      padding-top: 20px;
    }

    .chart-bar {
      flex: 1;
      min-width: 0;
      transition: height 0.3s ease;
    }

    .chart-bar.positive { background: var(--green); }
    .chart-bar.negative { background: var(--red); }
    .chart-bar:hover { opacity: 0.8; }

    .chart-labels {
      display: flex;
      gap: 3px;
      margin-top: 6px;
    }

    .chart-label {
      flex: 1;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
    }

    /* ─── Risk Status ─── */
    .risk-bar {
      height: 6px;
      background: var(--border);
      margin: 8px 0;
      position: relative;
    }

    .risk-fill {
      height: 100%;
      transition: width 0.5s ease;
    }

    .risk-fill.safe { background: var(--green); }
    .risk-fill.warning { background: var(--yellow); }
    .risk-fill.danger { background: var(--red); }

    .risk-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ─── Full-width sections ─── */
    .full-width {
      grid-column: 1 / -1;
    }

    .two-col {
      grid-column: span 2;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ─── Connection status ─── */
    .ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ws-status.connected .status-dot { background: var(--green); }
    .ws-status.disconnected .status-dot { background: var(--red); animation: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">C</div>
      Cogent
    </div>
    <div class="header-right">
      <div class="ws-status" id="ws-status">
        <span class="status-dot"></span>
        <span id="ws-label">connecting...</span>
      </div>
      <span id="clock"></span>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="stats-grid">
    <div class="stat">
      <div class="stat-label">Active Agents</div>
      <div class="stat-value blue" id="stat-agents">—</div>
      <div class="stat-sub" id="stat-agents-sub"></div>
    </div>
    <div class="stat">
      <div class="stat-label">Total Equity</div>
      <div class="stat-value" id="stat-equity">—</div>
      <div class="stat-sub" id="stat-equity-sub"></div>
    </div>
    <div class="stat">
      <div class="stat-label">Total P&L</div>
      <div class="stat-value" id="stat-pnl">—</div>
      <div class="stat-sub" id="stat-pnl-sub"></div>
    </div>
    <div class="stat">
      <div class="stat-label">Open Orders</div>
      <div class="stat-value" id="stat-orders">—</div>
      <div class="stat-sub" id="stat-orders-sub"></div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="grid">
    <!-- Activity Feed -->
    <div class="card two-col">
      <div class="card-title"><span class="live"></span> Activity Feed</div>
      <div class="feed" id="activity-feed">
        <div class="feed-item">
          <span class="feed-time">—</span>
          <span class="feed-detail">Waiting for data...</span>
        </div>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="card two-col">
      <div class="card-title">Leaderboard</div>
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Agent</th>
            <th>Equity</th>
            <th>P&L</th>
            <th>Return</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <tr><td colspan="5" style="color:var(--text-dim)">No agents yet</td></tr>
        </tbody>
      </table>
    </div>

    <!-- P&L Chart -->
    <div class="card two-col">
      <div class="card-title">Daily P&L (Last 14 Days)</div>
      <div class="chart-bars" id="pnl-chart"></div>
      <div class="chart-labels" id="pnl-labels"></div>
    </div>

    <!-- Risk Status -->
    <div class="card two-col">
      <div class="card-title">Risk Status</div>
      <div id="risk-panel">
        <div style="color:var(--text-dim); font-family:var(--font-mono); font-size:12px;">
          No active agents
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── State ───
    const state = {
      agents: [],
      trades: [],
      ws: null,
      reconnectMs: 1000,
    };

    // ─── Clock ───
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour12: false }) + ' UTC' + (now.getTimezoneOffset() > 0 ? '-' : '+') + Math.abs(now.getTimezoneOffset() / 60);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ─── WebSocket ───
    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${location.host}/ws/feed`);
      state.ws = ws;

      ws.onopen = () => {
        document.getElementById('ws-status').className = 'ws-status connected';
        document.getElementById('ws-label').textContent = 'live';
        state.reconnectMs = 1000;
        ws.send(JSON.stringify({ type: 'subscribe', channels: ['trades', 'markets'] }));
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          handleWSMessage(msg);
        } catch {}
      };

      ws.onclose = () => {
        document.getElementById('ws-status').className = 'ws-status disconnected';
        document.getElementById('ws-label').textContent = 'disconnected';
        setTimeout(connectWS, state.reconnectMs);
        state.reconnectMs = Math.min(state.reconnectMs * 2, 30000);
      };

      ws.onerror = () => ws.close();
    }

    function handleWSMessage(msg) {
      if (msg.type === 'trade_event' && msg.data) {
        addActivityItem(msg.data);
      }
    }

    // ─── Activity Feed ───
    function addActivityItem(trade) {
      const feed = document.getElementById('activity-feed');
      const time = new Date(trade.timestamp).toLocaleTimeString('en-US', { hour12: false });
      const badgeClass = trade.side === 'BUY' ? 'buy' : trade.side === 'SELL' ? 'sell' : 'cancel';

      const item = document.createElement('div');
      item.className = 'feed-item';
      item.innerHTML = `
        <span class="feed-time">${time}</span>
        <span class="feed-badge ${badgeClass}">${trade.side}</span>
        <span class="feed-agent">${trade.agentId?.slice(0, 16) ?? '?'}</span>
        <span class="feed-detail">${trade.outcome} $${Number(trade.amount).toFixed(2)} @ ${Number(trade.price).toFixed(3)}</span>
      `;

      if (feed.children.length === 1 && feed.children[0].querySelector('.feed-detail')?.textContent === 'Waiting for data...') {
        feed.innerHTML = '';
      }
      feed.prepend(item);
      while (feed.children.length > 50) feed.removeChild(feed.lastChild);
    }

    // ─── Polling ───
    async function fetchHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        document.getElementById('stat-agents').textContent = data.agents;
        document.getElementById('stat-orders').textContent = data.openOrders;
        document.getElementById('stat-orders-sub').textContent = `${data.wsClients} WS clients`;
        document.getElementById('stat-agents-sub').textContent = `uptime ${formatUptime(data.uptime)}`;
      } catch {}
    }

    async function fetchLeaderboard() {
      try {
        const res = await fetch('/api/portfolio/leaderboard');
        const data = await res.json();
        if (!data.leaderboard) return;

        state.agents = data.leaderboard;
        updateLeaderboard(data.leaderboard);
        updateStats(data.leaderboard);
        updateRiskPanel(data.leaderboard);
        updatePnLChart(data.leaderboard);
      } catch {}
    }

    function updateLeaderboard(agents) {
      const tbody = document.getElementById('leaderboard-body');
      if (agents.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim)">No agents yet</td></tr>';
        return;
      }
      tbody.innerHTML = agents.map((a, i) => `
        <tr>
          <td class="${i === 0 ? 'rank-1' : 'rank'}">${i + 1}</td>
          <td>${a.name}</td>
          <td>$${Number(a.equity).toLocaleString('en-US', { minimumFractionDigits: 2 })}</td>
          <td style="color:${a.pnl >= 0 ? 'var(--green)' : 'var(--red)'}">
            ${a.pnl >= 0 ? '+' : ''}$${Number(a.pnl).toLocaleString('en-US', { minimumFractionDigits: 2 })}
          </td>
          <td style="color:${a.pnlPct >= 0 ? 'var(--green)' : 'var(--red)'}">
            ${a.pnlPct >= 0 ? '+' : ''}${(a.pnlPct * 100).toFixed(1)}%
          </td>
        </tr>
      `).join('');
    }

    function updateStats(agents) {
      const totalEquity = agents.reduce((s, a) => s + a.equity, 0);
      const totalPnl = agents.reduce((s, a) => s + a.pnl, 0);
      const totalDeposited = agents.reduce((s, a) => s + a.deposited, 0);
      const pnlPct = totalDeposited > 0 ? totalPnl / totalDeposited : 0;

      document.getElementById('stat-equity').textContent = '$' + totalEquity.toLocaleString('en-US', { minimumFractionDigits: 2 });

      const pnlEl = document.getElementById('stat-pnl');
      pnlEl.textContent = (totalPnl >= 0 ? '+$' : '-$') + Math.abs(totalPnl).toLocaleString('en-US', { minimumFractionDigits: 2 });
      pnlEl.className = 'stat-value ' + (totalPnl >= 0 ? 'positive' : 'negative');

      document.getElementById('stat-pnl-sub').textContent = `${(pnlPct * 100).toFixed(1)}% return`;
    }

    function updateRiskPanel(agents) {
      const panel = document.getElementById('risk-panel');
      if (agents.length === 0) return;

      panel.innerHTML = agents.slice(0, 5).map(a => {
        const drawdown = a.deposited > 0 ? Math.max(0, (a.deposited - a.equity) / a.deposited) : 0;
        const pct = (drawdown * 100).toFixed(1);
        const cls = drawdown < 0.15 ? 'safe' : drawdown < 0.25 ? 'warning' : 'danger';
        return `
          <div style="margin-bottom:16px">
            <div class="risk-label">
              <span>${a.name}</span>
              <span>${a.status === 'circuit_break' ? '⚠️ HALTED' : pct + '% drawdown'}</span>
            </div>
            <div class="risk-bar">
              <div class="risk-fill ${cls}" style="width:${Math.min(pct, 100)}%"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updatePnLChart(agents) {
      // Generate mock daily P&L for visualization
      const chart = document.getElementById('pnl-chart');
      const labels = document.getElementById('pnl-labels');
      const days = 14;
      const values = [];

      for (let i = 0; i < days; i++) {
        const val = (Math.random() - 0.45) * 500; // Slight positive bias
        values.push(val);
      }

      const maxAbs = Math.max(...values.map(Math.abs), 1);

      chart.innerHTML = values.map(v => {
        const height = Math.max(2, (Math.abs(v) / maxAbs) * 100);
        const cls = v >= 0 ? 'positive' : 'negative';
        return `<div class="chart-bar ${cls}" style="height:${height}px" title="$${v.toFixed(0)}"></div>`;
      }).join('');

      labels.innerHTML = values.map((_, i) => {
        const d = new Date(Date.now() - (days - 1 - i) * 86400000);
        return `<div class="chart-label">${d.getDate()}</div>`;
      }).join('');
    }

    function formatUptime(seconds) {
      if (seconds < 60) return seconds + 's';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
      return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
    }

    // ─── Init ───
    connectWS();
    fetchHealth();
    fetchLeaderboard();
    setInterval(fetchHealth, 10000);
    setInterval(fetchLeaderboard, 15000);
  </script>
</body>
</html>
