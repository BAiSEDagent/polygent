<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cogent — AI Trading Dashboard</title>
  <style>
    :root {
      --bg: #0a0b0f;
      --bg-card: #12141c;
      --bg-hover: #1a1d28;
      --border: #1e2130;
      --text: #e4e6f0;
      --text-dim: #6b7194;
      --blue: #0052FF;
      --blue-dim: #0052ff33;
      --green: #00d68f;
      --red: #ff3d71;
      --yellow: #ffaa00;
      --purple: #9f6fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'SF Pro', 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--blue); }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 20px 24px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-header .count {
      background: var(--blue-dim);
      color: var(--blue);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }
    .card-body {
      padding: 0;
      max-height: 450px;
      overflow-y: auto;
    }
    .card-body::-webkit-scrollbar { width: 4px; }
    .card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .full-width { grid-column: 1 / -1; }

    /* Markets table */
    .market-row {
      display: grid;
      grid-template-columns: 1fr 90px 90px 80px 80px;
      align-items: center;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .market-row:hover { background: var(--bg-hover); }
    .market-row .question {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 12px;
    }
    .market-row .price {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-weight: 600;
      text-align: right;
    }
    .market-row .volume, .market-row .liquidity {
      text-align: right;
      color: var(--text-dim);
      font-size: 12px;
    }
    .market-row .change {
      text-align: right;
      font-weight: 600;
      font-size: 12px;
    }
    .change.up { color: var(--green); }
    .change.down { color: var(--red); }
    .change.flat { color: var(--text-dim); }
    .market-header {
      display: grid;
      grid-template-columns: 1fr 90px 90px 80px 80px;
      padding: 8px 18px;
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .market-header span:not(:first-child) { text-align: right; }

    /* Agents */
    .agent-row {
      display: grid;
      grid-template-columns: 1fr 100px 100px 80px 60px;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .agent-row .name {
      font-weight: 600;
    }
    .agent-row .strategy {
      font-size: 11px;
      color: var(--text-dim);
    }
    .agent-row .equity, .agent-row .pnl {
      text-align: right;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .agent-row .trades-count {
      text-align: right;
      color: var(--text-dim);
    }
    .agent-row .status-pill {
      text-align: center;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .status-active { background: #00d68f22; color: var(--green); }
    .status-circuit_break { background: #ff3d7122; color: var(--red); }
    .status-inactive { background: #6b719422; color: var(--text-dim); }

    /* Activity feed */
    .activity-item {
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      line-height: 1.5;
    }
    .activity-item .time {
      color: var(--text-dim);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
    }
    .activity-item .agent-name {
      color: var(--blue);
      font-weight: 600;
    }
    .activity-item .type-trade { color: var(--green); }
    .activity-item .type-signal { color: var(--yellow); }
    .activity-item .type-error { color: var(--red); }
    .activity-item .type-circuit_break { color: var(--red); font-weight: 700; }
    .activity-item .reasoning {
      color: var(--text-dim);
      font-size: 11px;
      margin-top: 2px;
    }

    /* Leaderboard */
    .lb-row {
      display: grid;
      grid-template-columns: 30px 1fr 90px 90px 70px 70px;
      align-items: center;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .lb-row .rank {
      font-weight: 700;
      color: var(--text-dim);
    }
    .lb-row .rank.gold { color: #ffd700; }
    .lb-row .rank.silver { color: #c0c0c0; }
    .lb-row .rank.bronze { color: #cd7f32; }
    .lb-row .pnl-val, .lb-row .equity-val, .lb-row .wr, .lb-row .trades-val {
      text-align: right;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
    }

    .pnl-positive { color: var(--green); }
    .pnl-negative { color: var(--red); }
    .pnl-zero { color: var(--text-dim); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }
    .empty-state .icon { font-size: 28px; margin-bottom: 8px; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 12px;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat .label { color: var(--text-dim); }
    .stat .value { font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🧠 <span>Cogent</span></div>
    <div class="status-badge">
      <div class="status-dot" id="ws-dot"></div>
      <span id="ws-status">Connecting...</span>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat"><span class="label">Markets:</span><span class="value" id="stat-markets">—</span></div>
    <div class="stat"><span class="label">Agents:</span><span class="value" id="stat-agents">—</span></div>
    <div class="stat"><span class="label">Paper Trades:</span><span class="value" id="stat-trades">—</span></div>
    <div class="stat"><span class="label">Total Volume:</span><span class="value" id="stat-volume">—</span></div>
    <div class="stat"><span class="label">Uptime:</span><span class="value" id="stat-uptime">—</span></div>
  </div>

  <div class="grid">
    <!-- Markets -->
    <div class="card full-width">
      <div class="card-header">
        📈 Live Markets
        <span class="count" id="market-count">0</span>
      </div>
      <div class="market-header">
        <span>Market</span><span>YES</span><span>NO</span><span>Volume</span><span>24h</span>
      </div>
      <div class="card-body" id="markets-body">
        <div class="empty-state"><div class="icon">⏳</div>Loading markets...</div>
      </div>
    </div>

    <!-- Agent Leaderboard -->
    <div class="card">
      <div class="card-header">
        🏆 Agent Leaderboard
        <span class="count" id="lb-count">0</span>
      </div>
      <div class="card-body" id="leaderboard-body">
        <div class="empty-state"><div class="icon">🤖</div>Waiting for agents...</div>
      </div>
    </div>

    <!-- Agents -->
    <div class="card">
      <div class="card-header">
        🤖 Registered Agents
        <span class="count" id="agent-count">0</span>
      </div>
      <div class="card-body" id="agents-body">
        <div class="empty-state"><div class="icon">🔧</div>Loading agents...</div>
      </div>
    </div>

    <!-- Activity Feed -->
    <div class="card full-width">
      <div class="card-header">
        📋 Activity Feed
        <span class="count" id="activity-count">0</span>
      </div>
      <div class="card-body" id="activity-body" style="max-height: 350px;">
        <div class="empty-state"><div class="icon">📡</div>Waiting for activity...</div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let ws = null;
    let reconnectTimer = null;

    // ─── Formatters ────────────────────────────────────────────
    const fmt = {
      usd: (n) => n >= 1e6 ? `$${(n/1e6).toFixed(1)}M` : n >= 1e3 ? `$${(n/1e3).toFixed(0)}K` : `$${n.toFixed(0)}`,
      price: (n) => `$${Number(n).toFixed(3)}`,
      pct: (n) => `${(n * 100).toFixed(1)}%`,
      pnl: (n) => n >= 0 ? `+$${n.toFixed(2)}` : `-$${Math.abs(n).toFixed(2)}`,
      pnlClass: (n) => n > 0 ? 'pnl-positive' : n < 0 ? 'pnl-negative' : 'pnl-zero',
      time: (ts) => new Date(ts).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }),
      change: (n) => {
        const pct = (n * 100).toFixed(1);
        return n > 0.001 ? `<span class="change up">+${pct}%</span>` :
               n < -0.001 ? `<span class="change down">${pct}%</span>` :
               `<span class="change flat">0.0%</span>`;
      }
    };

    // ─── Data Fetching ─────────────────────────────────────────
    async function fetchJSON(path) {
      try {
        const r = await fetch(`${API}${path}`);
        return await r.json();
      } catch { return null; }
    }

    async function refreshMarkets() {
      const data = await fetchJSON('/api/markets?limit=20');
      if (!data?.markets) return;

      const el = document.getElementById('markets-body');
      document.getElementById('market-count').textContent = data.markets.length;

      if (data.markets.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="icon">📊</div>No active markets</div>';
        return;
      }

      el.innerHTML = data.markets.map(m => {
        const yes = Number(m.outcomePrices?.[0] ?? 0);
        const no = Number(m.outcomePrices?.[1] ?? 0);
        const change = m.change24h ?? 0;
        return `<div class="market-row" title="${m.question}">
          <span class="question">${m.question}</span>
          <span class="price" style="color:var(--green)">${fmt.price(yes)}</span>
          <span class="price" style="color:var(--red)">${fmt.price(no)}</span>
          <span class="volume">${fmt.usd(m.volume || 0)}</span>
          ${fmt.change(change)}
        </div>`;
      }).join('');
    }

    async function refreshAgents() {
      const data = await fetchJSON('/api/runners');
      if (!data?.agents) return;

      const el = document.getElementById('agents-body');
      document.getElementById('agent-count').textContent = data.agents.length;

      if (data.agents.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="icon">🤖</div>No agents registered</div>';
        return;
      }

      el.innerHTML = data.agents.map(a => {
        const pnl = a.pnl ?? 0;
        return `<div class="agent-row">
          <div>
            <div class="name">${a.name}</div>
            <div class="strategy">${a.strategy} • ${a.totalTrades} trades</div>
          </div>
          <span class="equity">${fmt.usd(a.equity)}</span>
          <span class="pnl ${fmt.pnlClass(pnl)}">${fmt.pnl(pnl)}</span>
          <span class="trades-count">${a.totalSignals} sig</span>
          <span class="status-pill status-${a.status}">${a.status}</span>
        </div>`;
      }).join('');
    }

    async function refreshLeaderboard() {
      const data = await fetchJSON('/api/leaderboard');
      if (!data?.leaderboard) return;

      const el = document.getElementById('leaderboard-body');
      document.getElementById('lb-count').textContent = data.leaderboard.length;

      if (data.leaderboard.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="icon">🏆</div>No trading data yet</div>';
        return;
      }

      el.innerHTML = data.leaderboard.map((a, i) => {
        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        return `<div class="lb-row">
          <span class="rank ${rankClass}">#${i + 1}</span>
          <span>${a.agentName}</span>
          <span class="pnl-val ${fmt.pnlClass(a.totalPnl)}">${fmt.pnl(a.totalPnl)}</span>
          <span class="equity-val">${fmt.usd(a.currentEquity)}</span>
          <span class="wr">${fmt.pct(a.winRate)}</span>
          <span class="trades-val">${a.totalTrades}</span>
        </div>`;
      }).join('');
    }

    async function refreshActivity() {
      const data = await fetchJSON('/api/activity?limit=30');
      if (!data?.activity) return;

      const el = document.getElementById('activity-body');
      document.getElementById('activity-count').textContent = data.activity.length;

      if (data.activity.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="icon">📡</div>No activity yet. Agents are scanning markets...</div>';
        return;
      }

      el.innerHTML = data.activity.slice().reverse().map(a => {
        let detail = '';
        if (a.type === 'trade' && a.data) {
          detail = `${a.data.side} ${a.data.outcome} @ ${fmt.price(a.data.price)} × ${Number(a.data.amount).toFixed(1)}`;
        } else if (a.type === 'signal' && a.data) {
          detail = `${a.data.direction} ${a.data.outcome} (${fmt.pct(a.data.confidence)} conf)`;
        } else if (a.type === 'error' && a.data) {
          detail = a.data.error?.slice(0, 80);
        } else if (a.type === 'circuit_break' && a.data) {
          detail = `Drawdown: ${a.data.drawdown}`;
        }

        const reasoning = a.data?.reasoning ? `<div class="reasoning">${a.data.reasoning.slice(0, 120)}</div>` : '';

        return `<div class="activity-item">
          <span class="time">${fmt.time(a.timestamp)}</span>
          <span class="agent-name">${a.agentName}</span>
          <span class="type-${a.type}">[${a.type}]</span>
          ${detail}
          ${reasoning}
        </div>`;
      }).join('');
    }

    async function refreshStats() {
      const data = await fetchJSON('/api/stats');
      if (!data) return;

      document.getElementById('stat-markets').textContent = data.liveData?.marketsLoaded ?? '—';
      document.getElementById('stat-agents').textContent = data.agents?.total ?? '—';
      document.getElementById('stat-trades').textContent = data.trading?.totalPaperTrades ?? '—';
      document.getElementById('stat-volume').textContent = fmt.usd(data.trading?.totalVolume ?? 0);

      const health = await fetchJSON('/health');
      if (health?.uptime) {
        const h = Math.floor(health.uptime / 3600);
        const m = Math.floor((health.uptime % 3600) / 60);
        document.getElementById('stat-uptime').textContent = `${h}h ${m}m`;
      }
    }

    // ─── WebSocket ─────────────────────────────────────────────
    function connectWS() {
      const wsUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/feed`;
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        document.getElementById('ws-dot').style.background = 'var(--green)';
        document.getElementById('ws-status').textContent = 'Connected';
        ws.send(JSON.stringify({ type: 'subscribe', channels: ['markets', 'trades'] }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'trade_event') {
            // Refresh activity on new trade
            refreshActivity();
            refreshAgents();
            refreshLeaderboard();
          }
          if (msg.type === 'market_update') {
            refreshMarkets();
          }
        } catch {}
      };

      ws.onclose = () => {
        document.getElementById('ws-dot').style.background = 'var(--red)';
        document.getElementById('ws-status').textContent = 'Disconnected';
        reconnectTimer = setTimeout(connectWS, 5000);
      };

      ws.onerror = () => ws.close();
    }

    // ─── Init ──────────────────────────────────────────────────
    async function init() {
      await Promise.all([
        refreshMarkets(),
        refreshAgents(),
        refreshLeaderboard(),
        refreshActivity(),
        refreshStats(),
      ]);
      connectWS();

      // Periodic refresh
      setInterval(refreshMarkets, 30000);
      setInterval(refreshAgents, 15000);
      setInterval(refreshLeaderboard, 15000);
      setInterval(refreshActivity, 10000);
      setInterval(refreshStats, 30000);
    }

    init();
  </script>
</body>
</html>
